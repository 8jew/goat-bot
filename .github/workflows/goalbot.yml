name: Live Goal Bot

on:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install requirements
        run: pip install requests

      - name: Run Goal Bot
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: python test.py
